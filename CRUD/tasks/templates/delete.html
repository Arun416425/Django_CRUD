{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0 text-center">Confirm Deletion</h4>
            </div>
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamaition-triangle text-danger" style="font-size: 3rem;"></i>
                <h5 class="mt-3">Are you sure you want to delete?</h5>
                <p class="text-muted italic">"{{ task.task }}"</p>

                <form action="" method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-block">
                        <button type="submit" class="btn btn-danger px-4">Yes, Delete Permanently</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
