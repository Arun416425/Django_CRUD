{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>My Task List</h3>
        <a href="{% url 'post_task' %}" class="btn btn-success px-4">+ Add New Task</a>
    </div>

    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th scope="col" class="ps-4">Task Name</th>
                    <th scope="col" class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for t in tasks %}
                <tr>
                    <td class="align-middle ps-4">{{ t.task }}</td>
                    <td class="text-end pe-4">
                        <a href="{% url 'update_task' t.id %}" class="btn btn-sm btn-info text-white">Edit</a>
                        <a href="{% url 'delete_task' t.id %}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center py-4 text-muted">
                        No tasks available. Click "Add New Task" to get started!
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
